name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  test-and-format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sanitizer: [none, asan, ubsan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcunit1-dev pkg-config clang-format

      - name: Check code formatting
        run: |
          find . -name "build" -prune -o -regex '.*\.\(c\|h\)' -exec clang-format --dry-run --Werror {} +

      - name: Set build directory and flags
        id: config
        run: |
          if [ "${{ matrix.sanitizer }}" = "none" ]; then
            echo "build_dir=build" >> $GITHUB_OUTPUT
            echo "cmake_flags=-DCMAKE_BUILD_TYPE=Debug" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.sanitizer }}" = "asan" ]; then
            echo "build_dir=build-asan" >> $GITHUB_OUTPUT
            echo "cmake_flags=-DENABLE_ASAN=ON" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.sanitizer }}" = "ubsan" ]; then
            echo "build_dir=build-ubsan" >> $GITHUB_OUTPUT
            echo "cmake_flags=-DENABLE_UBSAN=ON" >> $GITHUB_OUTPUT
          fi

      - name: Configure CMake
        run: cmake -B ${{ steps.config.outputs.build_dir }} ${{ steps.config.outputs.cmake_flags }}

      - name: Build
        run: cmake --build ${{ steps.config.outputs.build_dir }}

      - name: Run tests
        run: ctest --test-dir ${{ steps.config.outputs.build_dir }} --output-on-failure
